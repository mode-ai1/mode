<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-label="MODE - Math plus Code">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="0.55" stop-color="#0c0a18"/>
      <stop offset="1" stop-color="#140a20"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00f0ff"/>
      <stop offset="0.5" stop-color="#8a2be2"/>
      <stop offset="1" stop-color="#ff007f"/>
    </linearGradient>
    <radialGradient id="orbCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00f0ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbMag" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff007f" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ff007f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbVio" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8a2be2" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#8a2be2" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="360" fill="url(#sky)"/>

  <!-- glow orbs -->
  <circle cx="170" cy="90" r="220" fill="url(#orbCyan)"/>
  <circle cx="1120" cy="280" r="240" fill="url(#orbMag)"/>
  <circle cx="900" cy="60" r="180" fill="url(#orbVio)"/>

  <!-- faint grid -->
  <g stroke="#00f0ff" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 60 H1280 M0 120 H1280 M0 180 H1280 M0 240 H1280 M0 300 H1280"/>
    <path d="M160 0 V360 M320 0 V360 M480 0 V360 M640 0 V360 M800 0 V360 M960 0 V360 M1120 0 V360"/>
  </g>

  <!-- wordmark -->
  <g font-family="'Outfit','Segoe UI',Helvetica,Arial,sans-serif" text-anchor="middle">
    <text x="640" y="178" font-size="150" font-weight="800" letter-spacing="6"
          fill="url(#neon)" filter="url(#glow)">M&#216;DE</text>
    <text x="640" y="232" font-size="30" font-weight="600" letter-spacing="14"
          fill="#cfe9ff" fill-opacity="0.92">M A T H &#160;&#160;+&#160;&#160; C &#216; D E</text>
    <text x="640" y="282" font-size="20" font-weight="400" letter-spacing="2"
          fill="#9aa6c8">Ignite the Language of the Universe</text>
  </g>

  <!-- code/math glyphs -->
  <g font-family="'JetBrains Mono',Consolas,monospace" font-size="22" fill-opacity="0.5">
    <text x="120" y="300" fill="#00f0ff">&#931; &#8730; &#960;</text>
    <text x="1080" y="100" fill="#ff007f">{ } &lt;/&gt;</text>
    <text x="1040" y="320" fill="#8a2be2">&#8729; for(i)</text>
    <text x="150" y="60" fill="#8a2be2">&#8734; &#8800;</text>
  </g>

  <!-- bottom neon rule -->
  <rect x="0" y="352" width="1280" height="8" fill="url(#neon)"/>
</svg>
